# mcp.brainmemory.ai → brain-connector (127.0.0.1:8788)
# Initial HTTP block; `certbot --nginx -d mcp.brainmemory.ai` rewrites it to 443+TLS.
server {
    listen 80;
    server_name mcp.brainmemory.ai;

    location / {
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # MCP streamable HTTP can stream (SSE) — don't buffer, allow long-lived.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
